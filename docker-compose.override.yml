services:
  backend:
    build:
      target: dev
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app
    environment:
      APP_ENV: development
      APP_LOG_LEVEL: DEBUG

  frontend:
    build:
      target: dev
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
